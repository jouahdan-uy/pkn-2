<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Hubungi Kami</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<section class="contact-page">

  <h1 class="contact-title">Hubungi Kami</h1>

  <p class="contact-subtitle">
    Punya pertanyaan atau ingin menjadi barista? Silakan kirim pesan di bawah ini!
  </p>

  <!-- Form Kontak -->
  <form action="#" class="contact-form">

    <div class="form-group">
      <label for="nama">Nama Lengkap:</label>
      <input type="text" id="nama" name="nama"
      placeholder="Masukkan nama kamu..." required>
    </div>

    <div class="form-group">
      <label for="email">Alamat Email:</label>
      <input type="email" id="email" name="email"
      placeholder="nama@email.com" required>
    </div>

    <div class="form-group">
      <label for="pesan">Pesan:</label>
      <textarea id="pesan" name="pesan" rows="4"
      placeholder="Tuliskan pesanmu di sini..." required></textarea>
    </div>

    <button type="submit" class="submit-btn">
      Kirim Pesan
    </button>

  </form>

  <hr class="contact-divider">

  <div class="contact-info">
    <h3>Informasi Lainnya</h3>

    <ul>
      <li><strong>Email:</strong> hunaifsahl@gmail.com</li>
      <li><strong>Lokasi:</strong>Indonesia</li>
    </ul>
  </div>

</section>

</body>
</html>
